# 推送 v* 标签 → 自动打包并发布到 GitHub Releases
# Actions 页手动运行 → 仅构建并上传产物（不创建 Release）
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: windows-latest
            target: ""
            name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build Tauri app (manual run)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target "${{ matrix.target }}"
          else
            npm run tauri build
          fi

      - name: Upload artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PiggyTrans-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PiggyTrans ${{ github.ref_name }}
          releaseBody: |
            ## 下载说明

            | 文件 | 适用系统 |
            |------|----------|
            | `*_aarch64.dmg` | Apple Silicon Mac (M 系列) |
            | `*_x64.dmg` | Intel Mac |
            | `*_x64-setup.exe` | Windows 64 位 |

            macOS 若提示无法验证开发者：右键应用 → **打开**。

            安装后若被拦截，可执行：
            `xattr -dr com.apple.quarantine /Applications/PiggyTrans.app`
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
